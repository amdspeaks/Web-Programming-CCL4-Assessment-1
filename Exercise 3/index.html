<!DOCTYPE html>
<html lang="en"> <!-- Sets language to English -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Images</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<!-- Contains all images -->
<div class="gallery">

    <!-- Image 1 -->
    <figure class="img-box imgA">
        <img src="venus.jpg" alt="Description of image 1" width="300">
        <figcaption>Venus</figcaption> <!-- Caption for images -->
    </figure>

    <!-- Image 2 -->
    <figure class="img-box imgB">
        <img src="earth.jpg" alt="Description of image 2" width="300">
        <figcaption>Earth</figcaption>
    </figure>

    <!-- Image 3 -->
    <figure class="img-box imgC">
        <img src="mars.jpg" alt="Description of image 3" width="300">
        <figcaption>Mars</figcaption>
    </figure>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- Character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive layout -->
    <title>Petrol Calculator</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Main container -->
<div class="container">

    <h1>The Petrol Calculator</h1>

    <!-- Input: cost per liter -->
    <label for="cost">Cost per Liter</label>
    <input type="number" id="cost" value="1.98" step="0.01">

    <!-- Input: liters -->
    <label for="liters">Liters Purchased</label>
    <input type="number" id="liters" value="0" step="0.1">

    <!-- Button to calculate -->
    <button onclick="calculateTotal()">Calculate Total</button>

    <!-- Result output -->
    <p id="result">Total: $0.00</p>

</div>

<!-- External JS (this is the rope that ties everything together) -->
<script src="script.js"></script>

</body>
</html>
